<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f6ad55"/>
      <stop offset="100%" style="stop-color:#ed8936"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bg-grad)"/>
  
  <!-- Decorative circles -->
  <circle cx="200" cy="200" r="300" fill="rgba(246,173,85,0.03)"/>
  <circle cx="1700" cy="800" r="400" fill="rgba(237,137,54,0.03)"/>
  <circle cx="960" cy="500" r="500" fill="rgba(255,255,255,0.01)"/>
  
  <!-- Menuvo Logo Text -->
  <text x="960" y="420" text-anchor="middle" font-family="'Helvetica Neue',Arial,sans-serif" font-size="96" font-weight="700" fill="url(#logo-grad)" filter="url(#glow)">Menuvo</text>
  
  <!-- Tagline -->
  <text x="960" y="500" text-anchor="middle" font-family="'Helvetica Neue',Arial,sans-serif" font-size="32" font-weight="300" fill="#a0aec0" letter-spacing="6">
    DIGITAL MENU BOARDS
  </text>
  
  <!-- Decorative line -->
  <line x1="710" y1="540" x2="1210" y2="540" stroke="rgba(246,173,85,0.3)" stroke-width="1"/>
  
  <!-- Menu Coming Soon -->
  <text x="960" y="620" text-anchor="middle" font-family="'Helvetica Neue',Arial,sans-serif" font-size="40" font-weight="400" fill="#e2e8f0" letter-spacing="2">
    Menu Coming Soon
  </text>
  
  <!-- Subtitle -->
  <text x="960" y="670" text-anchor="middle" font-family="'Helvetica Neue',Arial,sans-serif" font-size="18" font-weight="300" fill="#718096">
    Please check back — our digital menu is being prepared
  </text>
</svg>